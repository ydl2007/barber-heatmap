<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barber Heatmap — Napoli</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #map { height: 100%; width: 100%; }

        /* Header overlay */
        #header {
            position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255,255,255,.92);
            padding: 10px 22px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,.15);
            text-align: center; pointer-events: none;
            backdrop-filter: blur(6px);
        }
        #header h1 { font-size: 1.15rem; font-weight: 600; color: #222; }
        #header p { font-size: .78rem; color: #666; margin-top: 2px; }

        /* Legend */
        #legend {
            position: absolute; bottom: 30px; right: 16px;
            z-index: 1000; background: rgba(255,255,255,.9);
            padding: 10px 14px; border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,.12);
            font-size: .72rem; color: #444; min-width: 140px;
        }
        #legend .title { font-weight: 600; margin-bottom: 4px; text-align: center; }
        #legend .gradient {
            height: 14px; width: 100%;
            background: linear-gradient(to right, #ff0000, #ff8800, #ffee00, #00ff66, #00ccff, #0033ff);
            border-radius: 4px; margin: 4px 0;
        }
        #legend .labels { display: flex; justify-content: space-between; }
        #legend .labels span:first-child { color: #f00; }
        #legend .labels span:last-child { color: #0033ff; }

        /* Spinner */
        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            z-index: 9999;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(0,0,0,.1); border-top-color: #2563eb;
            border-radius: 50%; animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Stats badge */
        #stats {
            position: absolute; bottom: 30px; left: 16px;
            z-index: 1000; background: rgba(255,255,255,.9);
            padding: 8px 14px; border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,.12);
            font-size: .75rem; color: #444;
        }

        /* Error toast */
        #error-toast {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            z-index: 9999; background: #dc2626; color: #fff;
            padding: 10px 20px; border-radius: 8px;
            font-size: .85rem; box-shadow: 0 4px 16px rgba(220,38,38,.3);
            display: none; max-width: 90vw; text-align: center;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="header">
        <h1>✂️ Distanza dal Barbiere più vicino — Napoli</h1>
        <p>Rosso = vicino · Blu = lontano · Grigio = mare</p>
    </div>

    <div id="loader"><div class="spinner"></div></div>
    <div id="error-toast"></div>

    <div id="legend">
        <div class="title">Distanza (linea d'aria)</div>
        <div class="gradient"></div>
        <div class="labels">
            <span>Vicino</span>
            <span>Lontano</span>
        </div>
    </div>

    <div id="stats"></div>

    <script>
        // ─── Initialise map ────────────────────────────────────────────────
        const map = L.map('map', {
            center: [40.8359, 14.2488],
            zoom: 13,
            zoomControl: true,
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a>',
            maxZoom: 19,
        }).addTo(map);

        // ─── State ────────────────────────────────────────────────────────
        let gridOverlay = null;
        const loaderEl = document.getElementById('loader');
        const errorEl = document.getElementById('error-toast');
        const statsEl = document.getElementById('stats');

        // ─── Helpers ──────────────────────────────────────────────────────
        function showLoader(v) { loaderEl.style.display = v ? 'block' : 'none'; }

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            setTimeout(() => { errorEl.style.display = 'none'; }, 8000);
        }

        // ─── Fetch barbers ────────────────────────────────────────────────
        async function loadBarbers() {
            const resp = await fetch('/api/barbers');
            if (!resp.ok) throw new Error('Impossibile caricare i barbieri');
            const data = await resp.json();
            return data.barbers;
        }

        // ─── Fetch heatmap data ───────────────────────────────────────────
        async function loadHeatmap() {
            const resp = await fetch('/api/heatmap');
            if (!resp.ok) throw new Error('Impossibile caricare la mappa di calore');
            return await resp.json();
        }

        // ─── Distance → colour (HSL) ──────────────────────────────────────
        function distToCSS(distance, maxDist) {
            if (distance === null) return 'rgba(0,0,0,0)';  // sea = transparent
            const t = maxDist > 0 ? Math.min(distance / maxDist, 1) : 0;
            // hue: 0° (red) → 240° (blue)   saturation 100%, lightness 50%
            // Red = close to barber, Blue = far from barber
            // Perceptual curve to amplify differences in the 0-1km range
            const curved = Math.pow(t, 0.6);
            const hue = 240 * curved;
            return `hsl(${hue}, 100%, 50%)`;
        }

        // ─── Render heatmap as a canvas ImageOverlay ──────────────────────
        function renderHeatmapGrid(data) {
            if (gridOverlay) map.removeLayer(gridOverlay);

            const { points, cols, rows, bounds, max_distance_m } = data;
            if (!points || points.length === 0) return;

            const CELL = 8; // pixels per grid cell on the canvas
            const canvas = document.createElement('canvas');
            canvas.width = cols * CELL;
            canvas.height = rows * CELL;
            const ctx = canvas.getContext('2d');

            // Draw each grid cell
            for (let i = 0; i < points.length; i++) {
                const p = points[i];
                const col = i % cols;
                const row = Math.floor(i / cols);
                ctx.fillStyle = distToCSS(p.distance_m, max_distance_m);
                ctx.fillRect(col * CELL, row * CELL, CELL, CELL);
            }

            // Leaflet ImageOverlay bounds: [[south, west], [north, east]]
            const overlayBounds = [
                [bounds.lat_min, bounds.lng_min],
                [bounds.lat_max, bounds.lng_max],
            ];

            gridOverlay = L.imageOverlay(canvas.toDataURL(), overlayBounds, {
                opacity: 0.75,
                interactive: false,
            }).addTo(map);
        }

        // ─── Render barber markers ────────────────────────────────────────
        function renderBarbers(barbers) {
            barbers.forEach(b => {
                const icon = L.divIcon({
                    className: '',
                    html: '<div style="background:#2563eb;color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.25);">✂️</div>',
                    iconSize: [24, 24],
                    iconAnchor: [12, 12],
                });
                const marker = L.marker([b.lat, b.lng], { icon })
                    .bindPopup(`<b>${b.name}</b><br>${b.address}`);
                marker.addTo(map);
            });
        }

        // ─── Update stats ────────────────────────────────────────────────
        function updateStats(barberCount, gridCount, maxDist) {
            let distStr = maxDist >= 1000
                ? `${(maxDist / 1000).toFixed(1)} km`
                : `${Math.round(maxDist)} m`;
            statsEl.innerHTML = `
                <strong>${barberCount}</strong> barbieri ·
                <strong>${gridCount.toLocaleString()}</strong> punti griglia ·
                max dist: <strong>${distStr}</strong>
            `;
        }

        // ─── Main ─────────────────────────────────────────────────────────
        async function init() {
            showLoader(true);
            try {
                const [barbers, heatmap] = await Promise.all([loadBarbers(), loadHeatmap()]);

                if (!barbers || barbers.length === 0) {
                    showError('Nessun barbiere trovato. Controlla la chiave API.');
                    showLoader(false);
                    return;
                }

                renderBarbers(barbers);
                renderHeatmapGrid(heatmap);
                updateStats(barbers.length, heatmap.points.length, heatmap.max_distance_m);

                // Fit map to grid bounds
                const b = heatmap.bounds;
                map.fitBounds([[b.lat_min, b.lng_min], [b.lat_max, b.lng_max]]);
            } catch (err) {
                console.error(err);
                showError('Errore di caricamento: ' + err.message);
            } finally {
                showLoader(false);
            }
        }

        // ─── Start ────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
